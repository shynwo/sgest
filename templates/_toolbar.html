{# Mini toolbar: cloche (alertes), enveloppe (commandes) #}
<div id="mini-toolbar" class="container-fluid px-3 py-2 border-bottom d-flex justify-content-between align-items-center gap-2">
  <div class="mini-user-block d-flex align-items-center gap-2">
    {% if current_user %}
    <div class="mini-avatar-wrap position-relative">
      <img src="{{ current_user_avatar_url }}" alt="Profil" class="mini-avatar rounded-circle">
      <span class="mini-role-badge badge rounded-pill" data-role="{{ current_user_role_label|lower }}">
        {{ current_user_role_label }}
      </span>
    </div>
    <div class="mini-user-meta">
      <div class="mini-user-name">{{ current_user.username }}</div>
    </div>
    {% endif %}
  </div>

  <div class="d-flex align-items-center gap-2">
    <a id="btn-alerts" href="#" class="btn btn-sm btn-outline-light position-relative" title="Alertes stock" aria-label="Alertes stock">
      <i class="bi bi-bell"></i>
      <span id="badge-alerts" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
    </a>
    <a id="btn-orders" href="#" class="btn btn-sm btn-outline-light position-relative" title="Commandes" aria-label="Commandes">
      <i class="bi bi-envelope"></i>
      <span id="badge-orders" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary d-none">0</span>
    </a>
    {% if is_authenticated %}
    <form method="post" action="{{ url_for('logout') }}" class="d-inline">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <button class="btn btn-sm btn-outline-light" type="submit" title="Deconnexion" aria-label="Deconnexion">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </form>
    {% endif %}
  </div>
</div>
